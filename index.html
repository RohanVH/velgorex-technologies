<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Minimal Static SEO -->
    <title>Velgorex</title>

    <meta
      name="description"
      content="Velgorex is a website and software development company based in Bangalore."
    />

    <meta name="robots" content="index, follow" />

    <link rel="canonical" href="https://velgorex.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />

    <meta property="og:url" content="https://velgorex.com/" />

    <meta property="og:title" content="Velgorex" />

    <meta
      property="og:description"
      content="Velgorex builds modern websites, mobile apps and software solutions."
    />

    <meta
      property="og:image"
      content="https://velgorex.com/Logo.png"
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:title" content="Velgorex" />

    <meta
      name="twitter:description"
      content="Velgorex builds modern websites, mobile apps and software solutions."
    />

    <meta
      name="twitter:image"
      content="https://velgorex.com/Logo.png"
    />

    <link rel="icon" type="image/png" href="/Logo.png" />

    <meta name="theme-color" content="#000000" />
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
